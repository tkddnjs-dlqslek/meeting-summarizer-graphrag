name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install core dependencies (skip heavy ML libs for CI)
        run: |
          python -m pip install --upgrade pip
          # CI에서는 실제 STT/임베딩 모델을 돌리지 않으므로 faster-whisper와
          # sentence-transformers는 스킵한다. 테스트는 mock + NORMALIZE_DISABLE
          # 환경변수로 해당 코드 경로를 우회한다.
          pip install \
            fastapi \
            uvicorn \
            neo4j \
            anthropic \
            python-dotenv \
            httpx \
            aiofiles \
            python-multipart \
            numpy \
            pytest

      - name: Run unit tests (mocked external services)
        env:
          NORMALIZE_DISABLE: "1"
          # Placeholder values — 실제 호출은 하지 않지만 import 시점에
          # load_dotenv가 실패하지 않도록 더미 값을 넣는다.
          ANTHROPIC_API_KEY: "dummy"
          NEO4J_URI: "bolt://localhost:7687"
          NEO4J_USERNAME: "neo4j"
          NEO4J_PASSWORD: "dummy"
          NEO4J_DATABASE: "neo4j"
        run: |
          # normalize 모듈이 sentence-transformers를 import하지 않게 NORMALIZE_DISABLE=1.
          # graph_builder는 normalize를 import하되 find_canonical_name이 None을 돌려주는
          # 경로로 돌아간다. 단, test_normalize의 mock_encode 테스트는 _encode를 monkeypatch
          # 하므로 라이브러리 설치 없이도 통과한다.
          #
          # 단, api.normalize의 상단 import는 sentence-transformers를 실제로 import하지
          # 않는다 (lazy load). 따라서 문제 없음.
          python -m pytest tests/test_normalize.py tests/test_obsidian_writer.py tests/test_cypher_params.py -v

      - name: Module import smoke test
        env:
          NORMALIZE_DISABLE: "1"
          ANTHROPIC_API_KEY: "dummy"
          NEO4J_URI: "bolt://localhost:7687"
          NEO4J_USERNAME: "neo4j"
          NEO4J_PASSWORD: "dummy"
          NEO4J_DATABASE: "neo4j"
        run: |
          python -c "from graph import cypher_queries, neo4j_client; print('graph OK')"
          python -c "from api import extractor, graph_builder, agents, obsidian_writer, normalize; print('api OK')"
